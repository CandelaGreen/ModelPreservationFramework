name: Validate Profiles

on:
  push:
    paths:
      - "profiles/**/*.md"
      - "tools/validate.py"
      - "tools/requirements.txt"
      - ".github/workflows/validate.yml"
  pull_request:
    paths:
      - "profiles/**/*.md"
      - "tools/validate.py"
      - "tools/requirements.txt"
      - ".github/workflows/validate.yml"

jobs:
  validate:
    name: MPF Profile Validator
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tools/requirements.txt

      - name: Install dependencies
        run: pip install -r tools/requirements.txt

      - name: Validate all profiles
        run: |
          python tools/validate.py profiles/ --recursive --errors-only

      - name: Validate changed profiles (PR annotation)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get list of added/modified profile files in this PR
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'profiles/**/*.md')

          if [ -z "$CHANGED" ]; then
            echo "No profile files changed in this PR."
            exit 0
          fi

          echo "Changed profiles:"
          echo "$CHANGED"
          echo ""

          # Run validator on changed files only (full output with warnings)
          python tools/validate.py $CHANGED
